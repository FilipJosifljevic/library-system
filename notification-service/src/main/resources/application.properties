spring.application.name=notification-service
server.port=8085
spring.config.import=configserver:http://localhost:8888

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=events

# Email - optional, leave default (will log warning if send fails)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dslibrarysystem@gmail.com
spring.mail.password=dslibrary123
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true