name: Library System CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '21'
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

  # ==================== BUILD & TEST ====================
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all modules
        run: mvn clean install -DskipTests --batch-mode

      - name: Run unit tests
        run: mvn test --batch-mode

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jar-artifacts
          path: '**/target/*.jar'
          retention-days: 1

  # ==================== DOCKER BUILD & PUSH ====================
  docker-build-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      matrix:
        service:
          - config-server
          - discovery-server
          - api-gateway
          - user-service
          - book-service
          - loan-service
          - notification-service
          - fine-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR for ${{ matrix.service }}
        run: mvn clean package -DskipTests -pl ${{ matrix.service }} -am --batch-mode

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/library-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          dockerfile: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== INTEGRATION TEST ====================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all modules
        run: mvn clean install -DskipTests --batch-mode

      - name: Start infrastructure
        run: |
          docker compose up -d postgres-user postgres-loan postgres-fine mongo kafka
          echo "Waiting for infrastructure to be ready..."
          sleep 30

      - name: Wait for Postgres
        run: |
          until docker compose exec -T postgres-user pg_isready -U library -d user_db; do
            echo "Waiting for postgres-user..."
            sleep 5
          done

      - name: Run integration tests
        run: mvn verify -Pintegration-tests --batch-mode
        continue-on-error: true

      - name: Stop infrastructure
        if: always()
        run: docker compose down

  # ==================== NOTIFY ====================
  notify:
    name: Notify Pipeline Result
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build-push]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Pipeline Success
        if: needs.build-and-test.result == 'success' && needs.docker-build-push.result == 'success'
        run: |
          echo "✅ Pipeline completed successfully!"
          echo "All services built and pushed to Docker Hub"

      - name: Pipeline Failed
        if: needs.build-and-test.result == 'failure' || needs.docker-build-push.result == 'failure'
        run: |
          echo "❌ Pipeline failed!"
          exit 1
